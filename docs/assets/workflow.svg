<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="980" viewBox="0 0 1480 980" role="img" aria-labelledby="title desc">
  <title id="title">MOTEL Cross-Repository Workflow</title>
  <desc id="desc">Workflow diagram showing how the motel-platform repository produces structured data that feeds a separate MOTEL ontology, knowledge graph, backend API, and frontend web application repository.</desc>
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Tahoma, sans-serif; fill: #0f3b2b; }
      .subtitle { font: 500 18px 'Segoe UI', Tahoma, sans-serif; fill: #31594b; }
      .repoTitle { font: 700 18px 'Segoe UI', Tahoma, sans-serif; fill: #24473a; }
      .repoNote { font: 500 13px 'Segoe UI', Tahoma, sans-serif; fill: #5a766a; }
      .lane { font: 700 15px 'Segoe UI', Tahoma, sans-serif; fill: #4b6259; letter-spacing: 0.08em; text-transform: uppercase; }
      .boxText { font: 600 15px 'Segoe UI', Tahoma, sans-serif; fill: #123326; }
      .smallText { font: 600 13px 'Segoe UI', Tahoma, sans-serif; fill: #123326; }
      .legendText { font: 600 13px 'Segoe UI', Tahoma, sans-serif; fill: #355348; }
      .line { stroke: #2f7f5b; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .crossLine { stroke: #3e6fa5; stroke-width: 2.8; fill: none; marker-end: url(#arrowBlue); }
      .auxLine { stroke: #b4871f; stroke-width: 2.2; fill: none; marker-end: url(#arrowGold); stroke-dasharray: 6 5; }
      .data { fill: #eaf3ff; stroke: #4c77a8; stroke-width: 2; }
      .process { fill: #e9f7f0; stroke: #2f7f5b; stroke-width: 2; }
      .context { fill: #fff6de; stroke: #b4871f; stroke-width: 2; }
      .consumer { fill: #f4ecff; stroke: #7a58b5; stroke-width: 2; }
      .panel { fill: #ffffff; stroke: #dcece4; stroke-width: 2; }
      .repoA { fill: #f8fbfa; stroke: #d6e7df; stroke-width: 2; }
      .repoB { fill: #fbf9ff; stroke: #ddd3ef; stroke-width: 2; }
      .legendPanel { fill: #ffffff; stroke: #dcece4; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.2" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f7f5b" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8.2" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3e6fa5" />
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8.2" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#b4871f" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1480" height="980" fill="#f6fbf8" />
  <rect class="panel" x="24" y="22" width="1432" height="936" rx="24" />

  <text class="title" x="54" y="74">MOTEL Cross-Repository Workflow</text>
  <text class="subtitle" x="54" y="106">The current data workflow in motel-platform feeds a separate ontology, knowledge-graph, and web application stack</text>

  <rect class="repoA" x="54" y="150" width="720" height="620" rx="22" />
  <text class="repoTitle" x="80" y="186">Current repo: motel-platform</text>
  <text class="repoNote" x="80" y="208">Schema-first ingestion, harmonisation, registries, mappings, and published structured outputs</text>

  <rect class="repoB" x="806" y="150" width="520" height="620" rx="22" />
  <text class="repoTitle" x="832" y="186">Separate repo: MOTEL ontology / KG / web app</text>
  <text class="repoNote" x="832" y="208">TTL generation, GraphDB loading, FastAPI serving, and Next.js exploration interface</text>

  <rect class="legendPanel" x="1350" y="150" width="84" height="620" rx="20" />
  <text class="lane" x="1362" y="186">Legend</text>

  <rect class="data" x="96" y="270" width="170" height="84" rx="18" />
  <text class="boxText" x="124" y="304">Raw Source Data</text>
  <text class="smallText" x="120" y="326">spreadsheets, reports,</text>
  <text class="smallText" x="129" y="346">manual review</text>

  <rect class="process" x="330" y="270" width="188" height="84" rx="18" />
  <text class="boxText" x="362" y="304">Ingestion Process</text>
  <text class="smallText" x="354" y="326">notebook + helper module</text>
  <text class="smallText" x="369" y="346">source-specific adapter</text>

  <rect class="data" x="580" y="270" width="160" height="84" rx="18" />
  <text class="boxText" x="606" y="304">Unmapped YAML</text>
  <text class="smallText" x="600" y="326">motel-db/unmapped_entity</text>
  <text class="smallText" x="639" y="346">staging records</text>

  <rect class="process" x="330" y="432" width="188" height="84" rx="18" />
  <text class="boxText" x="350" y="466">Harmonisation Process</text>
  <text class="smallText" x="347" y="488">2_harmonise notebook</text>
  <text class="smallText" x="371" y="508">+ helper logic</text>

  <rect class="data" x="580" y="412" width="160" height="72" rx="18" />
  <text class="boxText" x="597" y="446">Controlled Vocabularies</text>
  <text class="smallText" x="625" y="468">and registries</text>

  <rect class="data" x="580" y="504" width="160" height="72" rx="18" />
  <text class="boxText" x="612" y="538">Mapping Tables</text>
  <text class="smallText" x="608" y="560">crosswalk outputs</text>

  <rect class="data" x="580" y="596" width="160" height="72" rx="18" />
  <text class="boxText" x="600" y="630">Linked Entity Output</text>
  <text class="smallText" x="612" y="652">harmonised records</text>

  <rect class="consumer" x="96" y="618" width="170" height="84" rx="18" />
  <text class="boxText" x="124" y="652">Release + Docs</text>
  <text class="smallText" x="120" y="674">published files for</text>
  <text class="smallText" x="125" y="694">review and reuse</text>

  <rect class="context" x="96" y="432" width="170" height="72" rx="18" />
  <text class="boxText" x="129" y="466">Schema Context</text>
  <text class="smallText" x="120" y="488">schema + schema_simple</text>

  <rect class="context" x="96" y="524" width="170" height="72" rx="18" />
  <text class="boxText" x="110" y="558">Registry + Review Context</text>
  <text class="smallText" x="113" y="580">lookup, provenance, checks</text>

  <rect class="context" x="846" y="270" width="170" height="84" rx="18" />
  <text class="boxText" x="868" y="304">Ontology Definitions</text>
  <text class="smallText" x="879" y="326">technologies, attributes,</text>
  <text class="smallText" x="913" y="346">flows, concepts</text>

  <rect class="process" x="1074" y="270" width="192" height="84" rx="18" />
  <text class="boxText" x="1101" y="304">TTL Conversion</text>
  <text class="smallText" x="1096" y="326">graph preparation scripts</text>
  <text class="smallText" x="1110" y="346">and notebooks</text>

  <rect class="data" x="846" y="438" width="170" height="84" rx="18" />
  <text class="boxText" x="890" y="472">TTL Files</text>
  <text class="smallText" x="876" y="494">ontology-based exports</text>

  <rect class="data" x="1074" y="438" width="192" height="84" rx="18" />
  <text class="boxText" x="1120" y="472">GraphDB</text>
  <text class="smallText" x="1103" y="494">knowledge graph repository</text>

  <rect class="process" x="846" y="610" width="170" height="84" rx="18" />
  <text class="boxText" x="881" y="644">FastAPI Backend</text>
  <text class="smallText" x="878" y="666">query and filter layer</text>

  <rect class="consumer" x="1074" y="610" width="192" height="84" rx="18" />
  <text class="boxText" x="1109" y="644">Next.js Frontend</text>
  <text class="smallText" x="1113" y="666">browse, filter, inspect</text>

  <rect class="consumer" x="846" y="780" width="420" height="92" rx="18" />
  <text class="boxText" x="965" y="816">Users</text>
  <text class="smallText" x="916" y="840">modelers, reviewers, ORD users, and demo app visitors</text>

  <path class="line" d="M266 312 L330 312" />
  <path class="line" d="M518 312 L580 312" />
  <path class="line" d="M660 354 L424 432" />

  <path class="line" d="M518 474 L580 448" />
  <path class="line" d="M518 474 L580 540" />
  <path class="line" d="M518 474 L580 632" />

  <path class="line" d="M181 618 L181 596" />
  <path class="auxLine" d="M266 468 L330 468" />
  <path class="auxLine" d="M266 560 L330 480" />
  <path class="auxLine" d="M266 468 L330 312" />

  <path class="crossLine" d="M740 448 L846 312" />
  <path class="crossLine" d="M740 540 L1074 312" />
  <path class="crossLine" d="M740 632 L1074 312" />

  <path class="line" d="M1016 312 L1074 312" />
  <path class="line" d="M1170 354 L1170 438" />
  <path class="line" d="M1016 480 L1074 480" />
  <path class="line" d="M1170 522 L1170 610" />
  <path class="line" d="M1016 652 L1074 652" />
  <path class="line" d="M1074 740 L1056 780" />
  <path class="line" d="M1170 694 L1170 780" />

  <path class="line" d="M266 660 L846 826" />

  <rect class="data" x="1362" y="230" width="24" height="20" rx="5" />
  <rect class="process" x="1362" y="276" width="24" height="20" rx="5" />
  <rect class="context" x="1362" y="322" width="24" height="20" rx="5" />
  <rect class="consumer" x="1362" y="368" width="24" height="20" rx="5" />

  <text class="legendText" x="1362" y="414">Data</text>
  <text class="legendText" x="1362" y="438">Process</text>
  <text class="legendText" x="1362" y="462">Context</text>
  <text class="legendText" x="1362" y="486">Output / user</text>

  <path class="line" d="M1362 530 L1392 530" />
  <text class="legendText" x="1362" y="556">Within repo</text>

  <path class="crossLine" d="M1362 592 L1392 592" />
  <text class="legendText" x="1362" y="618">Cross-repo handoff</text>

  <path class="auxLine" d="M1362 654 L1392 654" />
  <text class="legendText" x="1362" y="680">Guiding context</text>

  <rect class="panel" x="54" y="898" width="1380" height="42" rx="14" />
  <text class="legendText" x="78" y="924">`motel-platform` ends at structured MOTEL data publication; the downstream ontology repo turns those outputs into TTL, loads GraphDB, serves a FastAPI backend, and exposes a Next.js frontend.</text>
</svg>
