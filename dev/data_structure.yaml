## This yaml file is to define the data structure and definition for MOTEL project
# update date: 2026-05-29

## Main records
record:
    _type: records
    record_id: Unique identifier for this record (e.g., REC_001, REC_002)
    version:
        _description: Versioning information for this record
        version_number: Version number (e.g., 1.0, 1.1)
        date_created: Date when this version was created (ISO 8601 format: YYYY-MM-DD)
        date_modified: Date when this version was last modified (ISO 8601 format: YYYY-MM-DD)
    tech_id: Foreign key to Technology entity. Unique identifier for the technology
    source_id: Foreign key to Source entity. Identifier of the source document/database
    assumption_id: Foreign key to Assumption entity. Identifier of the assumption set
    scope:
        _description: Defines the context where this data applies
        geographic_scope: Foreign key to GeographicScope. Where this data applies (e.g., GEO_USA, GEO_EU)
        temporal_scope: Foreign key to TemporalScope. When this data applies (e.g., TIME_2023, TIME_2020_2025)
        capacity_scope: Foreign key to CapacityScope. Scale/capacity range (e.g., CAP_100_500_MW, CAP_RESIDENTIAL)
        system_boundary: Foreign key to SystemBoundary. Operating conditions or system boundaries (e.g., COND_ISO_BASELOAD)
    values:
        _description: List of actual values with uncertainties. Supports multiple values with different uncertainty estimates for the same technology.
        _item:
            attribute_id: Foreign key to Attribute entity. Unique identifier for the attribute (e.g., ATTR_CAPEX, ATTR_EFFICIENCY)
            value: The actual value of the attribute. Can be numeric, text, boolean, array, or dict.
            value_format: 'Data format: int, float, or foreign keys to controlled vacabulary'
            value_type: 'Data type: numeric, text, boolean, array, timeseries, distribution'
            unit: Unit of measurement (e.g., USD/kW, fraction, MW, years). Use standard units.
            uncertainty: The uncertainty associated with this value. Can be a single number or dict with min/max/std.
            note: Any additional notes about this value (e.g., assumptions, conditions, scenario name)


## Secondary dataset (linked to the main records)            
tech:
    _type: secondary
    tech_id: Unique identifier for the technology
    technology_name: Common name of the technology
    ehubx_tech_id: Corresponding ehubX technology ID in SwissX system
    ontology_iri: Corresponding Ontology IRI identifier, if available
    process_id: Corresponding process identifier, if available

review:
    _type: secondary
    record_id: Unique identifier for the record
    first_reviewer: '[Contributor identifier for the first reviewer'
    second_reviewer: Contributor identifier for the second reviewer
    first_review_approver: Contributor identifier for the first approver
    second_review_approver: Contributor identifier for the second approver
    first_review_approval_status: Approval status for first review (e.g., pending, approved, rejected)
    second_review_approval_status: Approval status for second review (e.g., pending, approved, rejected)
    date_created: Date when the record was created
    date_modified: Date when the record was last modified

source:
    _type: secondary
    source_id: Unique identifier of source entity. Identifier of the source document/database (e.g., SRC_NREL_ATB_2023)
    source_description: Name of the source document or database
    source_type: 'Type of source: report, database, article, website, book, other'
    link: 'DOI or URL link to the source document/database'
    access_date: 'Date when the source was accessed (ISO 8601 format: YYYY-MM-DD)'
    pdf_backup: 'File path or link to the PDF backup of the source document'
    confidence_level: 'Data quality assessment: high, medium, low'
    assessment_method: 'How data was obtained: measured, modeled, estimated, survey, manufacturer_spec, literature'
    assessment_date: 'When this record was created (ISO 8601 format: YYYY-MM-DD)'


## Supplementary dataset (linked to secondary dataset)
contributor:
    _type: supplementary
    contributor_id: Unique identifier for the contributor
    name: Full name of the contributor
    affiliation: Organization or institution the contributor is associated with
    email: Email address of the contributor

process:
    _type: supplementary
    process_id: Unique identifier for the process
    process_name: Name of the process
    process_description: Brief description of the process and its role in the system
    process_type: Type of process. conversion, storage, distribution, consumption, other
    process_category: Category of process. renewable, non-renewable, synthetic, other


## Controlled vocabulary 
attribute:
    _type: predefined
    attribute_id: Unique name/identifier of the attribute
    attribute_name: Common name of the attribute (e.g., Capital Expenditure, Efficiency)
    attribute_description: Description of what this attribute measures
    attribute_unit: Standard unit for this attribute (e.g., USD/kW, fraction, MW)
    ehubX_name: Corresponding ehubX attribute name, if available
    ontology_iri: Corresponding Ontology IRI identifier, if available
    note: Any additional notes about this attribute

carrier:
    _type: predefined
    carrier_id: Unique name/identifier of the energy carrier
    carrier_name: Common name of the energy carrier (e.g., Electricity, Hydrogen, Natural Gas)
    carrier_description: Description of the energy carrier (e.g., electricity, hydrogen, natural gas)
    carrier_type: Type of carrier. fuel, electricity, heat, other
    carrier_category: Category of carrier. renewable, non-renewable, synthetic, other
    carrier_reference: The reference information for the carrier definition
    carrier_note: Any additional notes about this carrier

geographic_scope:
    _type: predefined
    geographic_scope: Unique name/identifier of the geographic scope
    geographic_scope_description: Description of the geographic area (e.g., country, region, global)

temporal_scope:
    _type: predefined
    temporal_scope: Unique name/identifier of the temporal scope
    temporal_scope_description: Description of the time period (e.g., specific year, decade, date range)

capacity_scope:
    _type: predefined
    capacity_scope: Unique name/identifier of the capacity scope
    capacity_scope_description: Description of the capacity/scale range (e.g., residential, utility-scale, MW range)

system_boundary:
    _type: predefined
    system_boundary: Unique name/identifier of the system boundary
    system_boundary_description: Description of operating conditions or system boundaries

uncertainty:
    _type: predefined
    uncertainty: Unique name/identifier for the uncertainty type
    uncertainty_description: Description of the uncertainty type (e.g., range, standard deviation, confidence interval)
