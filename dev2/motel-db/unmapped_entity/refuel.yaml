    technology_description: 'Methane synthesis from Syngas via the thermo catalytic
      CO hydrogenation. '
    technology_type: Conversion
    technology_category: Catalytic hydrogenation
    process_name: Sabatier reactor
  scope:
    geographic_scope_description: ECA
    temporal_scope_description: '2030'
    capacity_scope_description: 0
    system_boundary_description: Plant ready to operate
    scope_assumption: Mature
  attributes:
  - attribute_name: technical_efficiency
    attribute_description: 'Overall energy conversion efficiency: main output energy
      / main input energy.'
    value: '0.55'
  - attribute_name: technology_readiness_level
    attribute_description: Technology Readiness Level on the standard 1–9 scale. For
      non-mature technologies; TRL values progress across tech_year.
    value: 9
  - attribute_name: tech_maturity
    attribute_description: Aggregated maturity classification derived from TRL. Updated
      per tech_year.
    value: Mature
  - attribute_name: reference_unit_size
    attribute_description: Nameplate capacity on which all specific cost and performance
      data are based.
    unit: CAP
    value: 100
  - attribute_name: theoretical_efficiency
    attribute_description: Ratio of the main output's energy content (LHV) to the
      main input's energy content (LHV) at theoretical maximum.
    value: '0.797'
  - attribute_name: operating_temperature
    attribute_description: Typical operating temperature of the process.
    unit: °C
    value: 300
  - attribute_name: power_capacity_min
    attribute_description: Smallest assumed unit capacity for the technology.
    unit: CAP
    value: 0
  - attribute_name: lifetime_economic
    attribute_description: Economic lifetime of the asset.
    unit: yr
    value: 25
  - attribute_name: capex_one_time
    attribute_description: Fixed capital expenditure (independent of size).
    unit: EUR
    value: 0
  - attribute_name: opex_fix_pct_of_capex
    attribute_description: Fixed annual operational expenditure expressed as a percentage
      of total CAPEX.
    unit: '%'
    value: 4
  - attribute_name: opex_per_capacity_yr
    attribute_description: Fixed annual operational expenditure per unit of installed
      capacity; excluding fuel costs.
    unit: EUR / CAP.yr
    value: 30
  - attribute_name: opex_per_energy
    attribute_description: Variable operational expenditure per unit of energy or
      mass output; excluding fuel costs.
    unit: EUR / CAP.hr
    value: 0
  - attribute_name: uncertainty_rating
    attribute_description: Flag indicating whether parameter values have been cross-checked
      against literature ranges.
    value: Medium
  - attribute_name: opex_one_time
    attribute_description: Fixed one-time operational expenditure independent of capacity.
    unit: EUR
    value: 0
  balancing:
    inputs:
    - carrier_name: H2Process
      share: 1.0
      unit: kWh
    - carrier_name: CO
      share: 0.139
      unit: kg
    main_input: H2Process
    outputs:
    - carrier_name: CH4
      share: 1.107
      unit: kWh
    - carrier_name: ThHt
      share: 0.284
      unit: kWh
    - carrier_name: H2O
      share: 0.089
      unit: kg
    main_output: CH4
  tags:
    related_project: reFuel.ch
    tags:
    - Catalytic hydrogenation
    - Conversion
    - Mature
  sources:
  - source_name: Müller Power-to-X Costs Review
    source_description: 'The costs of future energy technologies: A comprehensive
      review of power-to-X processes'
    linked_attribute:
    - capex_per_capacity
    - lifetime_yr
    - opex_per_capacity_yr
    - reference_unit_size
    - tech_maturity
    - technical_efficiency
  - source_name: Reaction Input-Output Stoichiometric Conversion
    source_description: Calculating Input Output Ratios of Reactions
    linked_attribute:
    - ratios_in
    - ratios_out
  validation_check: 'True'
  validation_note: 'erros: 0; warnings: 0'
