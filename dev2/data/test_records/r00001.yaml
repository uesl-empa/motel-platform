technology_name: Autothermal Decentralized Pyrolysis Reactor for Biochar Production
description: 'A techno-economic analysis of biochar production from residual forestry
  biomass (e.g., acacia, reed, broom, gorse) using an autothermal decentralized pyrolysis
  reactor in Central Portugal. The process valorizes low-quality biomass to prevent
  wildfires, produce biochar, and generate carbon credits. Three business scenarios
  were analyzed, differing in revenue streams: (1) biochar + carbon credits, (2) forest
  management + biochar + carbon credits, and (3) forest management + biochar + carbon
  credits + sale of surplus biomass.'
