  process_name: Pyrolysis
  process_type: thermochemical conversion
  process_category: material valorization
  process_assumption: "Process occurs at 300\u2013700\xB0C without oxygen. Biochar\
    \ is used as a soil conditioner, adsorbent, or carbon sink."
