## ------------------------------------------------------------------------------
## MAIN ENTITY LAYER
## ------------------------------------------------------------------------------

unmapped_entity:
    category: entity
    description: Staging schema for raw, unstructured data ingestion. All fields capture free-text inputs before data normalization.
    technology_name:
        type: string
        required: true
        description: The literal unparsed common name or label of the technology as specified in the raw source material.
    technology:
        type: dict
        description: Contains raw descriptive properties detailing the engineering, structural, and hardware context of the unmapped entity.
        properties:
            technology_description:
                type: string
                description: Free-text engineering parameters describing the technical baseline of the asset (e.g., 5 kW rooftop PV in CH with 18% efficiency).
            technology_type:
                type: string
                enum: [conversion, storage, distribution, consumption]
                optional: true
                description: The structural archetype classifying how the physical asset interacts with energy streams.
            technology_category:
                type: string
                optional: true
                description: Broad domain or energy paradigm grouping for the hardware (e.g., renewable, fossil_fuel, nuclear, synthetic).
            technology_assumption:
                type: string
                optional: true
                description: Explicit technical constraints, design variations, or baseline modifications assumed by the raw source provider.
            process_name:
                type: string
                optional: true
                description: The raw action-oriented label identifying the conversion or functional service taking place.
            process_type:
                type: string
                enum: [conversion, storage, distribution, consumption, other]
                optional: true
                description: The engineering classification of the operational flow dynamics.
            process_category:
                type: string
                optional: true
                description: The sector or technical thematic domain the flow processes belong to (e.g., power, low_temp_heat, heavy_industry).
            process_assumption:
                type: string
                optional: true
                description: Documented technical assumptions regarding thermodynamic efficiencies, input/output structures, or conversion limits.
    scope:
        type: dict
        description: Defines the specific contextual boundaries where the unmapped raw data point remains operationally valid.
        properties:
            geographic_scope_description:
                type: string
                description: Literal unparsed geographic area or region where data was measured or intended (e.g., Switzerland, EU27).
            temporal_scope_description:
                type: string
                description: The targeted implementation or performance year/period (e.g., 2025, 2030-2040 baseline).
            capacity_scope_description:
                type: string
                description: The scale boundary or equipment sizing threshold of the recorded asset (e.g., residential, utility-scale, 10-50 MW).
            system_boundary_description:
                type: string
                description: Operational infrastructure dependencies or network connection states (e.g., grid-connected, islanded microgrid).
            scenario:
                type: string
                optional: true
                description: The specific modeled narrative or sensitivity track path from the source (e.g., Net-Zero Trend, Pessimistic Case).
            scope_assumption:
                type: string
                optional: true
                description: Contextual assumptions regarding spatial or temporal translatability (e.g., data modeled for DE but valid for Central Europe).
    sources:
        type: array
        description: Loosely structured collection of raw reference citations. Fields are optional free-text — only source_name is expected.
        items:
            type: dict
            properties:
                source_name:
                    type: string
                    description: The name or short citation label of the reference (e.g., "NREL ATB 2023").
                source_description:
                    type: string
                    optional: true
                    description: Longer citation string, full title, or document reference as found in the raw material.
                link:
                    type: string
                    optional: true
                    description: URL or DOI as recorded — no format validation enforced at this stage.
                source_type:
                    type: string
                    optional: true
                    description: Free-text medium classification (e.g., "report", "database") — no enum enforced.
                assessment_method:
                    type: string
                    optional: true
                    description: Free-text note on how values were derived (e.g., "modeled", "manufacturer datasheet").
                assessment_notes:
                    type: string
                    optional: true
                    description: Page numbers, table references, or granular location hints within the source.
                linked_attribute:
                    type: array
                    optional: true
                    description: Free-text list of attribute names this source supports — no foreign key enforcement.
                    items:
                        type: string              
                    
    attributes:
        type: array
        description: Array of technical, financial, or operational metrics populated directly from the unstructured raw intake profile.
        items:
            type: dict
            properties:
                attribute_name:
                    type: string
                    description: Target metric descriptive identifier (e.g., Fixed OPEX, Electrical Efficiency).
                attribute_description:
                    type: string
                    description: Functional explanation defining what the unmapped variable quantifies or restricts.
                unit:
                    type: string
                    description: Literal string representation of engineering or monetary units (e.g., EUR/kW/year, fraction).
                value:
                    type: any
                    description: The raw data value — number, string, range, or array — exactly as found in the source.
                uncertainty_notes:
                    type: string
                    optional: true
                    description: Free-text description of any stated uncertainty, range, or confidence bounds (e.g., "± 10%", "0.8–0.9 depending on load").
                time_index:
                    type: array
                    items: string
                    description: Chronological anchor strings tracking multi-period or profile datasets (e.g., list of target years).
                notes:
                    type: string
                    optional: true
                    description: Any additional raw context, caveats, or parsing flags noted during ingestion.

    balancing:
        type: dict
        description: Defines the raw conversion ratios and multi-carrier mass or energy balances for multi-input/multi-output processes.
        properties:
            inputs:
                type: array
                description: Array listing incoming resource vectors and their relative share proportions.
                items:
                    type: dict
                    properties:
                        carrier_name:
                            type: string
                            description: Literal name of the unmapped input commodity flow (e.g., Biomass, Grid Electricity).
                        share:
                            type: float
                            description: Proportional numeric value tracking this specific carrier's fraction of total cumulative feedstocks.
                        unit:
                            type: string
                            enum: [fraction, percentage]
                            description: Measurement reference indicator bounding how the feedstock share value is quantified.
            main_input:
                type: string
                description: The designated baseline input carrier used as the denominator anchor for sizing efficiency conversion equations.
            outputs:
                type: array
                description: Array listing outgoing resource vectors and their relative share proportions.
                items:
                    type: dict
                    properties:
                        carrier_name:
                            type: string
                            description: Literal name of the unmapped output commodity flow (e.g., Methanol, Low-Temperature Heat).
                        share:
                            type: float
                            description: Proportional numeric value tracking this specific carrier's fraction of total output yield.
                        unit:
                            type: string
                            enum: [fraction, percentage]
                            description: Measurement reference indicator bounding how the product yield share value is quantified.
            main_output:
                type: string
                description: The primary target product carrier used by energy modeling solvers to define overall technology capacity limits.
            balance_assumption:
                type: string
                optional: true
                description: Engineering notes surrounding reference environmental or thermodynamic operating states (e.g., LHV basis at 15 degrees C).
    tags:
        type: dict
        description: Metadata grouping flags used to sort and locate the entity within project directories.
        properties:
            related_project:
                type: string
                optional: true
                description: Name of the overarching study consortium, database cluster, or project framework (e.g., SWEET-SURE).
            tags:
                type: array
                items: string
                optional: true
                description: Arbitrary categorical tag index strings for filtering (e.g., ['residential', 'decentralised']).

linked_entity:
    category: entity
    description: Validated relational matrix entity linking strict foreign keys to controlled vocabularies and normalized entities.
    linked_entity_id:
        type: string
        required: true
        description: Primary database key uniquely mapping this configuration matrix instance (e.g., REC_00001).
    version:
        type: dict
        description: Maintains formal audit trail history and deployment lifecycles for tracked parameters.
        properties:
            version_number:
                type: string
                required: true
                description: Semantic version tracking text for schema iteration indexing (e.g., 2.1.0).
            date_created:
                type: string
                format: date
                description: ISO 8601 creation calendar timestamp (YYYY-MM-DD).
            date_modified:
                type: string
                format: date
                description: ISO 8601 calendar timestamp tracking the most recent attribute update or review patch (YYYY-MM-DD).
    tech_id:
        type: string
        foreign_key: technology.tech_id
        required: true
        description: Relational link tying these data values to a specific validated, concrete physical equipment asset.
    source_id:
        type: string
        foreign_key: source.source_id
        required: true
        description: Relational link tying these values back to an explicitly validated and structured literature profile node.
    assumption_id:
        type: string
        optional: true
        description: Relational link referencing a shared global assumption profile block used across multiple distinct data points.
    scope:
        type: dict
        description: Structured boundaries restricting model solver access based on spatial and temporal network rules.
        properties:
            geographic_scope:
                type: string
                foreign_key: geographic_scope.geographic_scope
                description: Foreign key reference anchoring the boundary to a controlled geographic territory token.
            temporal_scope:
                type: string
                foreign_key: temporal_scope.temporal_scope
                description: Foreign key reference anchoring the validity to a specific target model timeframe index node.
            capacity_scope:
                type: string
                foreign_key: capacity_scope.capacity_scope
                description: Foreign key reference linking data validity to specific structured capacity bounds.
            system_boundary:
                type: string
                foreign_key: system_boundary.system_boundary
                description: Foreign key reference specifying configuration boundaries under a controlled system archetype.
    values:
        type: array
        description: Normalized parameter arrays binding attributes to precise mathematical numbers and explicit engineering error bounds.
        items:
            type: dict
            properties:
                attribute_id:
                    type: string
                    foreign_key: attribute.attribute_id
                    description: Foreign key reference targeting an engineering metric variable within the controlled vocabulary.
                value:
                    type: [number, string, boolean, array, dict]
                    description: The computational data payload matching the data schema constraints of the assigned attribute.
                value_format:
                    type: string
                    description: Strict variable typing rules or code compilation path rules used to format downstream array parsers.
                value_type:
                    type: string
                    enum: [numeric, text, boolean, array, timeseries, distribution]
                    description: System logic classification determining how downstream solvers treat the parameter matrix entry.
                unit:
                    type: string
                    description: System-wide normalized execution unit string strictly synced with core attribute standard definitions.
                uncertainty:
                    type: dict
                    description: Fleshed-out relational boundaries mapping exact low/high limits for stochastic or deterministic sensitivity runs.
                    properties:
                        uncertainty_type:
                            type: string
                            enum: [range, standard_deviation, confidence_interval, variance]
                            description: Mathematical formatting context governing how upper, lower, and standard error variables are processed.
                        upper_value:
                            type: float
                            optional: true
                            description: The absolute maximum upper bounding value observed under testing thresholds.
                        lower_value:
                            type: float
                            optional: true
                            description: The absolute minimum lower bounding value observed under testing thresholds.
                        other_value:
                            type: string
                            optional: true
                            description: Alternative notation values or alphanumeric statistical metadata payloads (e.g., confidence step percentages).
                        uncertainty_assumption:
                            type: string
                            optional: true
                            description: Relational notation tracking the statistical distribution profiles applied during solver execution.
                note:
                    type: string
                    optional: true
                    description: User-facing comment string highlighting internal computational idiosyncrasies.
    balancing:
        type: dict
        description: Structured conversion matrix balancing multiple inputs and outputs via controlled system carrier elements.
        properties:
            inputs:
                type: array
                description: List matching verified system incoming input resource streams.
                items:
                    type: dict
                    properties:
                        carrier_id:
                            type: string
                            foreign_key: carrier.carrier_id
                            description: Foreign key referencing a unique energy carrier entity from the controlled vocabulary.
                        share:
                            type: float
                            description: Proportional numeric value tracking this specific carrier's fraction of total cumulative feedstocks.
                        unit:
                            type: string
                            enum: [fraction, percentage]
                            description: Measurement reference indicator bounding how the feedstock share value is quantified.
            main_input:
                type: string
                foreign_key: carrier.carrier_id
                description: Foreign key establishing the primary commodity vector denominator used for efficiency index evaluations.
            outputs:
                type: array
                description: List matching verified system outgoing output resource streams.
                items:
                    type: dict
                    properties:
                        carrier_id:
                            type: string
                            foreign_key: carrier.carrier_id
                            description: Foreign key referencing a unique energy carrier entity from the controlled vocabulary.
                        share:
                            type: float
                            description: Proportional numeric value tracking this specific carrier's fraction of total output yield.
                        unit:
                            type: string
                            enum: [fraction, percentage]
                            description: Measurement reference indicator bounding how the product yield share value is quantified.
            main_output:
                type: string
                foreign_key: carrier.carrier_id
                description: Foreign key tracking the primary output commodity used by modeling engines to evaluate capacity scaling size limits.
            balance_assumption:
                type: string
                optional: true
                description: Relational balance remarks referencing specific standardized thermal or pressure states.

## ------------------------------------------------------------------------------
## SECONDARY DATASET LAYERS
## ------------------------------------------------------------------------------

technology:
    category: secondary
    description: Defines asset-specific physical infrastructure, operational limits, costs, and hardware profiles.
    tech_id:
        type: string
        required: true
        description: Unique alphanumerical hardware key acting as the primary key for physical equipment assets (e.g., tech_00041).
    technology_name:
        type: string
        required: true
        description: Standardized machine-readable asset identifier using snake_case (e.g., El_Electrolysis_Alkaline).
    technology_description:
        type: string
        description: Engineering narrative defining the technical performance bounds, scope limits, or mechanical configurations of the hardware.
    technology_variant:
        type: string
        optional: true
        description: The hyper-specific architectural subcategory or cell structure of the asset (e.g., Anion Exchange Membrane).
    main_process:
        type: string
        foreign_key: process.process_id
        description: Foreign key (process name) mapping this physical asset back to the core operational network service node it serves.
    main_operation_unit:
        type: string
        description: The localized machinery component where the mechanical transformation occurs (e.g., Fuel cell stack, Gas core).
    ontology_iri:
        type: string
        format: uri
        optional: true
        description: Fully resolved link connecting this hardware structure to external semantic web frameworks like OEO or Wikidata.

process:
    category: secondary
    description: Defines functional service pathways, mass balances, and grid conversion topologies independently of physical hardware.
    process_id:
        type: string
        required: true
        description: Unique alphanumerical operational link key acting as the primary key for functional pathways (e.g., proc_H2_prod).
    process_name:
        type: string
        required: true
        description: Standardized human-readable label defining the service framework action (e.g., Hydrogen Production).
    process_description:
        type: string
        description: Summary outlining the physical, chemical, or thermodynamic conversion pipeline, explaining its placement within the net grid.
    process_type:
        type: string
        enum: [conversion, storage, distribution, consumption, other]
        description: Core energy system framework archetype classifying the physical dynamic of this process.
    process_category:
        type: string
        description: Technical operational grouping identifying the engineering discipline classification (e.g., Thermochemical Upgrading).
    main_sector:
        type: string
        description: The primary energy system demand vector this flow interfaces with (e.g., power, heat, transport, industry).
    feedstocks:
        type: array
        items: string
        description: Array of controlled vocabulary carrier_ids entering this process pipeline node as raw consumables.
    products:
        type: array
        items: string
        description: Array of controlled vocabulary carrier_ids exiting this process pipeline node as useful commodities or emissions.

source:
    category: secondary
    description: Stores historical literature origins, validation criteria, and source citation indices.
    source_id:
        type: string
        required: true
        description: Unique primary identifier index tracking reference origin profiles (e.g., SRC_NREL_ATB_2023).
    source_name:
        type: string
        required: true
        description: Standard clean citation title of the source document or relational library database.
    source_description:
        type: string
        description: Comprehensive breakdown tracking data collection scope, original authors, and reference metadata profiles.
    source_type:
        type: string
        enum: [report, database, article, website, book, other]
        description: Classification profile sorting the structural medium of the referencing material.
    link:
        type: string
        format: uri
        description: Direct URL or Digital Object Identifier (DOI) web path to the original publication source.
    access_date:
        type: string
        format: date
        description: ISO 8601 logging calendar stamp indicating when the source entity was retrieved or audited (YYYY-MM-DD).
    confidence_level:
        type: string
        enum: [high, medium, low]
        description: Data governance quality score based on source prestige, transparency, and data age parameters.
    assessment_method:
        type: string
        enum: [measured, modeled, estimated, survey, manufacturer_spec, literature]
        description: Procedural framework tracking how the source data point values were fundamentally calculated.
    assessment_date:
        type: string
        format: date
        description: ISO 8601 calendar date logging when the entity was formally curated into the MOTEL database structure (YYYY-MM-DD).
    note:
        type: string
        description: Internal notes tracking specific data point idiosyncrasies, parsing edge cases, or source reliability caveats.

## ------------------------------------------------------------------------------
## SUPPLEMENTARY LAYER (Governance & Peer-Review Logging)
## ------------------------------------------------------------------------------

contributor:
    category: supplementary
    description: Tracks account credentials and institutional profiles of research personnel updating dataset elements.
    contributor_id:
        type: string
        required: true
        description: Primary key string identifying a distinct user profile entity within the governance matrix.
    name:
        type: string
        required: true
        description: Full professional legal name of the research contributor.
    affiliation:
        type: string
        description: The primary university, corporate entity, or laboratory group representing the user (e.g., ETH Zurich).
    email:
        type: string
        format: email
        description: Validated active academic or professional communication endpoint address.

review:
    category: supplementary
    description: Data quality assurance tracking block monitoring validation status steps across multi-stage review pipelines.
    review_id:
        type: string
        required: true
        description: Primary key uniquely indexing a single evaluation event workflow (e.g., REV_00102).
    linked_entity_id:
        type: string
        foreign_key: linked_entity.linked_entity_id
        required: true
        description: Foreign key linkage targeting the exact linked entity object undergoing peer-review assessment.
    first_reviewer:
        type: string
        foreign_key: contributor.contributor_id
        description: Contributor foreign key locating the designated primary domain-expert auditor.
    second_reviewer:
        type: string
        foreign_key: contributor.contributor_id
        description: Contributor foreign key locating the secondary cross-disciplinary verification auditor.
    first_review_approver:
        type: string
        foreign_key: contributor.contributor_id
        description: Contributor foreign key locating the senior research authority clearing the entry for release staging.
    second_review_approver:
        type: string
        foreign_key: contributor.contributor_id
        description: Contributor foreign key locating the second database administrator clearing the relational matrix entry.
    first_review_approval_status:
        type: string
        enum: [pending, approved, rejected]
        description: Real-time state flag tracking progress through the initial gatekeeper validation checks.
    second_review_approval_status:
        type: string
        enum: [pending, approved, rejected]
        description: Real-time state flag tracking progress through the secondary database structural validation checks.
    date_created:
        type: string
        format: date
        description: ISO 8601 record generation calendar timestamp (YYYY-MM-DD).
    date_modified:
        type: string
        format: date
        description: ISO 8601 entry modification timestamp monitoring governance change interactions (YYYY-MM-DD).

## ------------------------------------------------------------------------------
## CONTROLLED VOCABULARY REFERENCE ARCHETYPES (Predefined Nodes)
## ------------------------------------------------------------------------------

attribute:
    category: predefined
    description: Controlled registry defining standardized cost, parameter, and capability fields across all models.
    attribute_id:
        type: string
        required: true
        description: Primary key tracking the immutable metric token variable (e.g., ATTR_CAPEX, ATTR_ANNUAL_AVAILABILITY).
    attribute_name:
        type: string
        required: true
        description: Standard human-readable nomenclature name for display layouts (e.g., Capital Expenditure).
    attribute_description:
        type: string
        description: Detailed description defining operational math bounds, accounting lines, and engineering definitions.
    unit:
        type: string
        description: The strict target standardized canonical unit mandated for this field across database entities (e.g., USD/kW).
    data_format:
        type: string
        enum: [int, float, text, boolean, array]
        description: Structural parser instruction flag mapping validation rules for primitive cell entry variables.
    ontology_iri:
        type: string
        format: uri
        optional: true
        description: External ontology database URI link matching global terminology networks.
    note:
        type: string
        optional: true
        description: System administration annotations detailing specific boundary conditions or parsing edge cases.

carrier:
    category: predefined
    description: Controlled vocabulary framework registering mass and energy commodities routed through model layouts.
    carrier_id:
        type: string
        required: true
        description: Primary immutable database key identifying a network commodity node (e.g., carrier_H2, carrier_AC_electricity).
    carrier_name:
        type: string
        required: true
        description: Human-readable label mapping the commodity fluid or vector type (e.g., Gaseous Hydrogen).
    carrier_description:
        type: string
        description: Explains standard purity constraints, chemical composition expectations, or infrastructure context bounds.
    carrier_type:
        type: string
        enum: [fuel, electricity, heat, other]
        description: System classification organizing the resource into primary energy or utility archetypes.
    carrier_category:
        type: string
        enum: [renewable, non-renewable, synthetic, other]
        description: Environmental lifecycle grouping for greenhouse gas accounting track protocols.
    carrier_reference:
        type: string
        description: Standard references tracking physical density values, enthalpy baselines, or safety rule document IDs.
    carrier_note:
        type: string
        optional: true
        description: Internal engineering system remarks tracking cross-carrier conversion caveats.

geographic_scope:
    category: predefined
    description: Controlled vocabulary indexing geographic bounds and territory constraints.
    geographic_scope:
        type: string
        required: true
        description: Primary alphanumerical token key mapping spatial domains (e.g., GEO_CHE, GEO_EU27).
    geographic_scope_description:
        type: string
        description: Detailed breakdown of political, grid connection, or regional territory lines encompassed by the token.

temporal_scope:
    category: predefined
    description: Controlled vocabulary indexing target implementation horizons and chronological target phases.
    temporal_scope:
        type: string
        required: true
        description: Primary key mapping specific chronological execution targets (e.g., TIME_2030, TIME_2050_NETZERO).
    temporal_scope_description:
        type: string
        description: Clarifies target baseline steps, multi-year model averages, or specific historical weather year projections.

capacity_scope:
    category: predefined
    description: Controlled vocabulary registry organizing equipment scale boundaries and installation tiers.
    capacity_scope:
        type: string
        required: true
        description: Primary reference token key classifying asset deployment dimensions (e.g., CAP_COMMERCIAL_SCALE).
    capacity_scope_description:
        type: string
        description: Strict numeric range boundaries or qualitative engineering definitions of the installation size tier.

system_boundary:
    category: predefined
    description: Controlled vocabulary registry managing network integration states and baseline dispatch roles.
    system_boundary:
        type: string
        required: true
        description: Primary reference key mapping operational layout system boundaries (e.g., BOUND_STANDALONE_OFFGRID).
    system_boundary_description:
        type: string
        description: Explicit documentation clarifying grid interface configurations, input dependency cut-offs, and downstream losses.