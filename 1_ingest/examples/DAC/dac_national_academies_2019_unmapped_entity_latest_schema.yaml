technology_name: Direct Air Capture (DAC) - National Academies 2019 solid sorbent and solvent DAC benchmarks
technology:
  technology_description: Direct air capture technology removing CO2 from ambient air; raw staging record for DAC techno-economic
    review before harmonisation.
  technology_type: conversion
  technology_category: carbon_dioxide_removal
  technology_notes: Record covers direct air capture benchmarks from the National Academies negative emissions technologies
    report, especially solid sorbent DAC cost and energy-source caveats.
  process_name: Direct air capture of atmospheric CO2
  process_type: conversion
  process_category: carbon_dioxide_removal
  process_notes: Raw process description kept broad at ingestion stage; source-specific DAC and possible storage/net-removal
    implications are preserved in scope and attribute notes.
scope:
  geographic_scope: global_or_literature_generic
  geographic_scope_description: Global / technology-generic literature benchmark; not tied to one model region at ingestion
    stage.
  temporal_scope: 2019_report_benchmark
  temporal_scope_description: 2019 report perspective; includes current/near-term benchmark statements and potential future
    large-scale values from report analysis.
  capacity_scope: one_MtCO2_per_year_reference_and_literature_benchmark
  capacity_scope_description: Includes a 1 MtCO2/year reference plant scale for some solid sorbent DAC analysis; other cost
    statements are broad literature benchmarks.
  system_boundary: dac_capture_and_energy_source_emissions_caveat
  system_boundary_description: DAC capture cost and net-removal implications depending on energy source; report discusses
    capture, energy-source emissions and sequestration context.
  scenario: National Academies negative emissions technology benchmark for DAC
  scope_notes: Report year is 2019; values are useful as a benchmark but should be reviewed before applying to 2050 TechDB
    central assumptions.
sources:
- source_name: National_Academies_2019_NETs_DAC_Chapter
  source_description: 'National Academies of Sciences, Engineering, and Medicine. Negative Emissions Technologies and Reliable
    Sequestration: A Research Agenda. Chapter 5: Direct Air Capture. Washington, DC: The National Academies Press, 2019. DOI:
    10.17226/25259.'
  link: https://doi.org/10.17226/25259
  source_type: report
  access_date: '2026-07-01'
  confidence_level: high_for_source_metadata; review_required_for_model_adoption
  reference_year: 2019
  assessment_method: Manual extraction from National Academies chapter text and summary lines; retained as raw staging values
    before harmonisation.
  source_locator: Chapter 5 Direct Air Capture; Table 5.8 and surrounding discussion; summary chapter
  linked_attribute:
  - deployed_air_capture_cost_statement
  - solid_sorbent_middle_range_capture_cost
  - designed_DAC_process_cost_range
  - first_generation_commercial_plant_capture_cost
  - unoptimized_process_cost
  - large_scale_promising_scenario_cost_potential
  - reference_plant_scale
  - adsorbent_cost_driver
  - solid_sorbent_DAC_emissions_solar_solar_mid_range
  - solid_sorbent_DAC_emissions_natural_gas_natural_gas_mid_range
  source_notes: Mentioned in the DAC review email as a benchmark for DAC costs around 100-600 USD/tCO2 and current commercial
    values around 600 USD/tCO2.
attributes:
- attribute_name: deployed_air_capture_cost_statement
  value: substantially above 100 USD/tCO2, as high as 600 USD/tCO2
  uncertainty_notes: Summary-level statement for deployed air capture costs.
  attribute_notes: Unit included in value. Useful as a near/current benchmark caveat.
- attribute_name: solid_sorbent_middle_range_capture_cost
  value: 88-228 USD/tCO2 for a generic solid sorbent direct air capture system
  uncertainty_notes: Middle range of more realistic scenarios in the committee analysis.
  attribute_notes: Unit included in value. Source context should be checked before using as a central model value.
- attribute_name: designed_DAC_process_cost_range
  value: 100-600 USD/tCO2 for DAC systems using physically realistic process parameters designed for direct air capture
  uncertainty_notes: Broad range; not a single central value.
  attribute_notes: Unit included in value. Broad range for realistic DAC process parameters.
- attribute_name: first_generation_commercial_plant_capture_cost
  value: about 600 USD/tCO2 for Climeworks first-generation commercial plant
  attribute_notes: Reported by Climeworks according to the National Academies chapter; keep as reported benchmark, not as
    harmonised market price.
- attribute_name: unoptimized_process_cost
  value: at least 1000 USD/tCO2 for processes not specifically optimized for DAC
  attribute_notes: Unit included in value. Source compares poor/unoptimized designs to earlier estimates.
- attribute_name: large_scale_promising_scenario_cost_potential
  value: close to 100 USD/tCO2 for large-scale processes over 1 MtCO2/year using known materials and gas-solid contactors
    in most promising scenarios; no such large-scale continuously operating installation existed at the time
  uncertainty_notes: Optimistic large-scale scenario value; not demonstrated at report time.
  attribute_notes: Unit included in value. Important caveat against treating this lower bound as demonstrated.
- attribute_name: reference_plant_scale
  value: 1 MtCO2/year CO2 captured or removed
  attribute_notes: Scale used in National Academies analysis tables for solid sorbent DAC.
- attribute_name: adsorbent_cost_driver
  value: Adsorbent CAPEX dominates overall cost; adsorbent cost and lifetime are important cost-reduction levers
  attribute_notes: Extracted from committee sensitivity discussion.
- attribute_name: solid_sorbent_DAC_emissions_solar_solar_mid_range
  value: 0.0084-0.018 MtCO2/year emissions for a 1 MtCO2/year solid sorbent DAC system using solar desorption heat and solar
    electricity for fans/pumps
  attribute_notes: Unit retained in value. Mid-range from Table 5.8; shows energy-source dependence of net removal.
- attribute_name: solid_sorbent_DAC_emissions_natural_gas_natural_gas_mid_range
  value: 0.29-0.44 MtCO2/year emissions for a 1 MtCO2/year solid sorbent DAC system using natural gas for desorption heat
    and natural gas electricity for fans/pumps
  attribute_notes: Unit retained in value. Mid-range from Table 5.8; shows energy-source dependence of net removal.
balancing:
  inputs:
  - carrier_name: ambient air
    carrier_notes: Dilute atmospheric air used as CO2 source; no quantified air-flow ratio extracted at this staging step.
    share: 1.0
    unit: fraction
  main_input: ambient air
  outputs:
  - carrier_name: CO2 captured / removed
    carrier_notes: CO2 separated from ambient air; storage or net-removal boundary depends on the source-specific DAC, DACS,
      or DACCS definition.
    share: 1.0
    unit: fraction
  main_output: CO2 captured / removed
  balancing_notes: The report analyses DAC capture and net-removal implications for different energy sources; exact material
    and energy balances are not harmonised here.
