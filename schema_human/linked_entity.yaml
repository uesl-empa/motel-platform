LinkedEntity: # Validated relational matrix entity linking strict foreign keys to controlled vocabularies and normalised entities.
    linked_entity_id: "[Required; String] Primary database key uniquely mapping this configuration matrix instance (e.g., REC_00001)."
    version: # [Dictionary] Maintains formal audit trail history and deployment lifecycles for tracked parameters.
        version_number: "[Required; String] Semantic version tracking text for schema iteration indexing (e.g., 2.1.0)."
        date_created: "[String] ISO 8601 creation calendar timestamp (YYYY-MM-DD)."
        date_modified: "[String] ISO 8601 calendar timestamp tracking the most recent attribute update or review patch (YYYY-MM-DD)."
    tech_id: "[Required; String] Relational link tying these data values to a specific validated, concrete physical equipment asset."
    sources: # [List of Dictionaries] Array of validated literature sources providing data for this entity, mapping specific attributes to their exact origins.
        source_id: "[Required; String] Relational link tying these values back to an explicitly validated and structured literature profile node."
        linked_attributes: "[Required; List of Strings] Array of attribute ID tokens explicitly extracted from this specific reference source document."
    assumptions: # [List of Dictionaries] Array of shared global assumption profile blocks, mapping specific attributes to their underlying system or methodology rules.
        assumption_id: "[Required; String] Relational link referencing a shared global assumption profile block (e.g., ASSUMP_MATURE_MARKET)."
        linked_attributes: "[Required; List of Strings] Array of attribute ID tokens whose calculations or boundaries are governed by this specific assumption."
    scope: # [Dictionary] Structured boundaries restricting model solver access based on spatial and temporal network rules.
        geographic_scope: "[String] Foreign key reference anchoring the boundary to a controlled geographic territory token."
        temporal_scope: "[String] Foreign key reference anchoring the validity to a specific target model timeframe index node."
        capacity_scope: "[String] Foreign key reference linking data validity to specific structured capacity bounds."
        system_boundary: "[String] Foreign key reference specifying configuration boundaries under a controlled system archetype."
    values: # [List of Dictionaries] Normalised parameter arrays binding attributes to precise mathematical numbers and explicit engineering error bounds.
        attribute_id: "[String] Foreign key reference targeting an engineering metric variable within the controlled vocabulary."
        value: "[Number/String/Boolean/List/Dictionary] The computational data payload matching the data schema constraints of the assigned attribute."
        value_format: "[String] Strict variable typing rules or code compilation path rules used to format downstream array parsers."
        value_type: "[String] System logic classification determining how downstream solvers treat the parameter matrix entry."
        unit: "[String] System-wide normalised execution unit string strictly synced with core attribute standard definitions."
        uncertainty: # [Dictionary] Fleshed-out relational boundaries mapping exact low/high limits for stochastic or deterministic sensitivity runs.
            uncertainty_type: "[String] Mathematical formatting context governing how upper, lower, and standard error variables are processed."
            upper_value: "[Number] The absolute maximum upper bounding value observed under testing thresholds."
            lower_value: "[Number] The absolute minimum lower bounding value observed under testing thresholds."
            other_value: "[String] Alternative notation values or alphanumeric statistical metadata payloads (e.g., confidence step percentages)."
            uncertainty_assumption: "[String] Relational notation tracking the statistical distribution profiles applied during solver execution."
        note: "[String] User-facing comment string highlighting internal computational idiosyncrasies."
    balancing: # [Dictionary] Structured conversion matrix balancing multiple inputs and outputs via controlled system carrier elements.
        inputs: # [List of Dictionaries] List matching verified system incoming input resource streams.
            carrier_id: "[String] Foreign key referencing a unique energy carrier entity from the controlled vocabulary."
            share: "[Number] Proportional numeric value tracking this specific carrier's fraction of total cumulative feedstocks."
            unit: "[String] Measurement reference indicator bounding how the feedstock share value is quantified."
        main_input: "[String] Foreign key establishing the primary commodity vector denominator used for efficiency index evaluations."
        outputs: # [List of Dictionaries] List matching verified system outgoing output resource streams.
            carrier_id: "[String] Foreign key referencing a unique energy carrier entity from the controlled vocabulary."
            share: "[Number] Proportional numeric value tracking this specific carrier's fraction of total output yield."
            unit: "[String] Measurement reference indicator bounding how the product yield share value is quantified."
        main_output: "[String] Foreign key tracking the primary output commodity used by modeling engines to evaluate capacity scaling size limits."
        balance_assumption: "[String] Relational balance remarks referencing specific standardised thermal or pressure states."
