Attribute: # Controlled registry defining standardised cost, parameter, and capability fields across all models.
    attribute_id: "[Required; String] Primary key tracking the immutable metric token variable (e.g., ATTR_CAPEX, ATTR_ANNUAL_AVAILABILITY)."
    attribute_name: "[Required; String] Standard human-readable nomenclature name for display layouts (e.g., Capital Expenditure). Capitalised, no underscores, no unit included."
    attribute_description: "[Required; String] Detailed description defining operational math bounds, accounting lines, and engineering definitions."
    unit: "[Required; String] The strict target standardised canonical unit mandated for this field across database entities (e.g., EUR/kW, ratio, years). When source notes specify a currency for generic 'Currency' formats, preserve that stated currency and do not assume USD."
    data_format: "[Required; String] Structural parser instruction flag mapping validation rules for primitive cell entry variables."
    ontology_iri: "[String] External ontology database URI link matching global terminology networks."
    note: "[String] System administration annotations detailing specific boundary conditions or parsing edge cases."
